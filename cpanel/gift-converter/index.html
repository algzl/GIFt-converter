<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gift-converter</title>
    <meta
      name="description"
      content="Browser-based batch video to GIF converter with per-file FPS, render modes, and ZIP download."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <style>
:root {
  --bg: #e6e6e6;
  --panel: #fffdfa;
  --line: #d8d3c7;
  --text: #111111;
  --muted: #706b61;
  --dot: rgba(17, 17, 17, 0.065);
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font: 13px/1.45 "Space Mono", "Courier New", monospace;
}

button,
input,
select {
  font: inherit;
}

button,
input,
select,
.left-panel,
.workspace-board,
.table-wrap,
.progress-counter,
.summary-box {
  border: 1px solid var(--line);
  background: #fff;
}

button {
  min-height: 34px;
  padding: 7px 10px;
  cursor: pointer;
}

button:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

input[hidden] {
  display: none !important;
}

.desktop-shell {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 312px minmax(0, 1fr);
  gap: 12px;
  padding: 12px;
}

.left-panel {
  display: flex;
  flex-direction: column;
  padding: 8px;
}

.panel-section {
  padding: 8px 0;
}

.panel-section + .panel-section {
  margin-top: 6px;
}

.section-title {
  margin-bottom: 8px;
}

.primary-section {
  display: grid;
  gap: 8px;
}

.primary-button,
.dark-button,
.board-select-button,
.board-clear-button {
  background: #111;
  color: #fff;
  border-color: #111;
}

.wide-button,
.stack-actions > button {
  width: 100%;
}

.status-line {
  margin: 0;
  color: #387a49;
}

label {
  display: block;
  margin-bottom: 8px;
}

input,
select {
  display: block;
  width: 100%;
  margin-top: 6px;
  padding: 8px 10px;
}

.stack-actions {
  display: grid;
  gap: 6px;
}

.field-disabled {
  opacity: 0.42;
}

.brand-footer {
  margin-top: auto;
  min-height: 176px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

.brand-link-button {
  position: relative;
  display: inline-flex;
  flex-direction: column;
  align-items: center;
}

.brand-mark {
  width: 184px;
  height: auto;
  display: block;
}

.desktop-link {
  position: absolute;
  right: -4px;
  bottom: 58px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 8px;
  background: rgba(255, 255, 255, 0.92);
  border: 1px solid var(--line);
  color: var(--text);
  text-decoration: none;
  font-size: 11px;
}

.github-mark {
  width: 13px;
  height: 13px;
}

.right-panel {
  min-width: 0;
  display: flex;
}

.workspace-board {
  flex: 1 1 auto;
  min-width: 0;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
}

.board-topline {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 10px 12px;
  background: radial-gradient(circle at 1px 1px, var(--dot) 1px, transparent 0);
  background-size: 9px 9px;
  border-bottom: 1px solid var(--line);
}

.board-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.board-actions-left {
  flex: 1 1 auto;
}

.board-actions-right {
  flex: 0 0 auto;
  justify-content: flex-end;
}

.progress-counter,
.summary-box {
  min-height: 34px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.progress-counter {
  padding: 0 12px;
}

.board-stop-button {
  min-width: 84px;
  background: #111;
  color: rgba(255, 255, 255, 0.42);
  border-color: rgba(255, 255, 255, 0.34);
}

.board-stop-button:not(:disabled) {
  color: #fff;
  border-color: #111;
}

.summary-box {
  position: relative;
  min-width: 136px;
  padding: 0 12px;
  overflow: hidden;
}

.summary-box-fill {
  position: absolute;
  inset: 0 auto 0 0;
  width: var(--completion-progress, 0%);
  background: #111;
  transition: width 160ms ease;
}

.summary-box-label {
  position: relative;
  z-index: 1;
  color: #fff;
  mix-blend-mode: difference;
}

.board-scroll {
  min-height: 0;
  overflow: auto;
  background: #fff;
}

.table-wrap {
  border: 0;
  background: #fff;
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead th {
  background: #fff;
  text-align: left;
  padding: 14px 12px;
  border-bottom: 1px solid #ece7dd;
  position: sticky;
  top: 0;
  z-index: 1;
}

tbody td {
  background: #fff;
  border-top: 1px solid #ece7dd;
  padding: 12px;
  vertical-align: top;
}

.empty-row td {
  text-align: center;
  color: var(--muted);
  padding: 28px 12px;
}

.file-cell {
  display: flex;
  gap: 14px;
}

.preview {
  width: 156px;
  height: 96px;
  object-fit: cover;
  border: 1px solid var(--line);
  background: #f1ede4;
}

.file-name {
  font-weight: 400;
}

.file-sub {
  margin-top: 4px;
  color: var(--muted);
  word-break: break-all;
}

.row-fps-input {
  width: 86px;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  min-height: 30px;
  padding: 0 10px;
  border: 1px solid var(--line);
  background: #fff;
}

.progress-wrap {
  min-width: 180px;
}

.progress-bar {
  height: 10px;
  border: 1px solid var(--line);
  background: #fff;
  overflow: hidden;
}

.progress-bar span {
  display: block;
  height: 100%;
  width: 0;
  background: #111;
}

.progress-copy {
  margin-top: 6px;
  color: var(--muted);
}

.output-link {
  color: var(--text);
  text-decoration: underline;
}

.log-overlay {
  position: fixed;
  right: 16px;
  bottom: 16px;
  width: min(420px, calc(100vw - 32px));
  height: 154px;
  display: flex;
  flex-direction: column;
  background: rgba(255, 255, 255, 0.58);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(198, 198, 192, 0.34);
  border-radius: 18px;
}

.log-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px 4px;
}

.log-title {
  color: rgba(22, 22, 22, 0.7);
  font-size: 12px;
}

.log-body {
  flex: 1 1 auto;
  min-height: 0;
  overflow: auto;
  padding: 0 10px 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.log-entry {
  text-align: right;
  color: rgba(22, 22, 22, 0.82);
}

.log-entry-success {
  color: rgba(56, 122, 73, 0.9);
}

.log-entry-error {
  color: rgba(176, 46, 46, 0.92);
}

.log-time {
  color: rgba(102, 102, 95, 0.78);
  font-size: 12px;
}

@media (max-width: 980px) {
  .desktop-shell {
    grid-template-columns: 1fr;
  }

  .log-overlay {
    width: calc(100vw - 32px);
  }
}

    </style>
</head>
  <body>
    <div class="desktop-shell">
      <aside class="left-panel">
        <section class="panel-section primary-section import-section">
          <button id="pickButton" class="primary-button">Start Import</button>
          <input id="fileInput" type="file" multiple hidden />
          <p id="statusLine" class="status-line">Ready.</p>
        </section>

        <section class="panel-section">
          <div class="section-title">FPS</div>
          <label>
            FPS to apply
            <input id="bulkFpsInput" type="number" min="1" max="60" value="15" />
          </label>
          <div class="stack-actions">
            <button id="applyAllFpsButton" class="dark-button wide-button" type="button">Apply to All</button>
            <button id="applySelectedFpsButton" class="wide-button" type="button">Apply to Selected</button>
          </div>
        </section>

        <section class="panel-section">
          <div class="section-title">Quality</div>
          <label>
            Render mode
            <select id="renderModeSelect">
              <option value="clean">Clean</option>
              <option value="detail">Detail</option>
              <option value="retro">Retro</option>
              <option value="stable">Stable</option>
            </select>
          </label>
          <label>
            Color count
            <input id="colorCountInput" type="number" min="16" max="256" value="96" />
          </label>
          <label>
            Width mode
            <select id="sizeModeSelect">
              <option value="long-edge" selected>Original</option>
              <option value="custom">Custom</option>
            </select>
          </label>
          <label>
            <span id="primarySizeLabel">Long edge (px)</span>
            <input id="widthInput" type="number" min="64" max="1920" value="640" />
          </label>
          <label id="heightField" class="field-disabled">
            <span id="secondarySizeLabel">Height (auto)</span>
            <input id="heightInput" type="number" min="64" max="1920" value="480" disabled />
          </label>
        </section>

        <section class="panel-section">
          <div class="section-title">Output</div>
          <div class="stack-actions">
            <button id="exportButton" class="dark-button wide-button" type="button">Export GIFs</button>
            <button id="zipButton" class="wide-button" type="button" disabled>Download ZIP</button>
          </div>
        </section>

        <div class="brand-footer">
          <div class="brand-link-button">
            <svg class="brand-mark" xmlns="http://www.w3.org/2000/svg" width="295.804" height="322.82" viewBox="0 0 295.804 322.82" aria-hidden="true">
              <g>
                <polygon points="295.804 21.527 295.804 35.867 288.582 35.867 288.582 86.091 281.378 86.091 281.378 129.128 288.582 129.128 288.582 164.995 281.378 164.995 281.378 193.692 288.582 193.692 288.582 208.032 281.378 208.032 281.378 229.559 274.157 229.559 274.157 243.899 266.935 243.899 266.935 251.086 259.731 251.086 259.731 258.256 252.509 258.256 252.509 265.426 245.288 265.426 245.288 272.596 230.862 272.596 230.862 286.953 223.658 286.953 223.658 294.123 187.585 294.123 187.585 301.293 173.143 301.293 173.143 308.463 151.513 308.463 151.513 315.65 122.644 315.65 122.644 322.82 93.793 322.82 93.793 315.65 86.571 315.65 86.571 294.123 100.997 294.123 100.997 286.953 57.72 286.953 57.72 294.123 7.204 294.123 7.204 286.953 0 286.953 0 265.426 28.851 265.426 28.851 258.256 36.073 258.256 36.073 243.899 43.277 243.899 43.277 236.729 50.499 236.729 50.499 229.559 64.924 229.559 64.924 222.389 72.146 222.389 72.146 215.219 79.35 215.219 79.35 208.032 86.571 208.032 86.571 200.862 93.793 200.862 93.793 193.692 100.997 193.692 100.997 179.335 108.218 179.335 108.218 172.165 115.44 172.165 115.44 164.995 122.644 164.995 122.644 150.655 129.865 150.655 129.865 143.468 137.07 143.468 137.07 129.128 151.513 129.128 151.513 121.958 158.717 121.958 158.717 114.771 165.938 114.771 165.938 107.601 173.143 107.601 173.143 93.261 180.364 93.261 180.364 78.904 187.585 78.904 187.585 50.224 180.364 50.224 180.364 43.037 173.143 43.037 173.143 21.527 194.79 21.527 194.79 14.34 209.215 14.34 209.215 7.17 223.658 7.17 223.658 0 245.288 0 245.288 7.17 266.935 7.17 266.935 14.34 288.582 14.34 288.582 21.527 295.804 21.527" fill="#e31b23" />
              </g>
            </svg>
            <a class="desktop-link" href="https://github.com/algzl/GIFt-converter/releases" target="_blank" rel="noreferrer">
              <svg class="github-mark" viewBox="0 0 16 16" aria-hidden="true">
                <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.55 7.55 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
              </svg>
              <span>Win app</span>
            </a>
          </div>
        </div>
      </aside>

      <main class="right-panel">
        <section id="dropZone" class="workspace-board">
          <div class="board-topline">
            <div class="board-actions board-actions-left">
              <button id="selectAllButton" class="board-select-button" type="button">Select All</button>
              <button id="clearButton" class="board-clear-button" type="button">Clear List</button>
              <div id="progressCounter" class="progress-counter">0 / 0 completed</div>
              <div id="jobsMeter" class="summary-box">
                <span id="jobsMeterLabel" class="summary-box-label">0 jobs</span>
                <span class="summary-box-fill" aria-hidden="true"></span>
              </div>
            </div>
            <div class="board-actions board-actions-right">
              <button id="topStopButton" class="board-stop-button" type="button" disabled>Stop</button>
            </div>
          </div>

          <div class="board-scroll">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Select</th>
                    <th>File</th>
                    <th>FPS</th>
                    <th>Status</th>
                    <th>Progress</th>
                    <th>Output</th>
                  </tr>
                </thead>
                <tbody id="queueBody">
                  <tr class="empty-row">
                    <td colspan="6">Drop videos here or use Start Import.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>

    <section id="logShell" class="log-overlay" aria-live="polite">
      <div class="log-head">
        <span class="log-title">Log</span>
      </div>
      <div id="logPanel" class="log-body"></div>
    </section>
    <script type="module">
import { FFmpeg } from "https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js";
import { fetchFile, toBlobURL } from "https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.2/dist/esm/index.js";
import JSZip from "https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm";

const VIDEO_EXTENSIONS = new Set([
  "mp4",
  "mov",
  "mkv",
  "avi",
  "webm",
  "m4v",
  "wmv",
  "flv",
  "mpeg",
  "mpg",
  "3gp",
  "ts",
  "mts",
  "m2ts",
  "ogv",
  "ogm",
  "qt",
  "asf",
  "vob",
  "mxf",
  "f4v",
  "rm",
  "rmvb",
  "divx"
]);

const state = {
  jobs: [],
  ffmpeg: null,
  ffmpegLoaded: false,
  running: false,
  cancelRequested: false
};

const elements = {
  fileInput: document.querySelector("#fileInput"),
  pickButton: document.querySelector("#pickButton"),
  statusLine: document.querySelector("#statusLine"),
  bulkFpsInput: document.querySelector("#bulkFpsInput"),
  applyAllFpsButton: document.querySelector("#applyAllFpsButton"),
  applySelectedFpsButton: document.querySelector("#applySelectedFpsButton"),
  renderModeSelect: document.querySelector("#renderModeSelect"),
  colorCountInput: document.querySelector("#colorCountInput"),
  sizeModeSelect: document.querySelector("#sizeModeSelect"),
  widthInput: document.querySelector("#widthInput"),
  heightInput: document.querySelector("#heightInput"),
  heightField: document.querySelector("#heightField"),
  primarySizeLabel: document.querySelector("#primarySizeLabel"),
  secondarySizeLabel: document.querySelector("#secondarySizeLabel"),
  exportButton: document.querySelector("#exportButton"),
  zipButton: document.querySelector("#zipButton"),
  selectAllButton: document.querySelector("#selectAllButton"),
  clearButton: document.querySelector("#clearButton"),
  progressCounter: document.querySelector("#progressCounter"),
  jobsMeter: document.querySelector("#jobsMeter"),
  jobsMeterLabel: document.querySelector("#jobsMeterLabel"),
  topStopButton: document.querySelector("#topStopButton"),
  queueBody: document.querySelector("#queueBody"),
  dropZone: document.querySelector("#dropZone"),
  logPanel: document.querySelector("#logPanel")
};

function getExtension(name = "") {
  const match = String(name).toLowerCase().match(/\.([^.]+)$/);
  return match ? match[1] : "";
}

function isSupportedVideoFile(file) {
  if (!file) {
    return false;
  }

  const extension = getExtension(file.name);
  if (VIDEO_EXTENSIONS.has(extension)) {
    return true;
  }

  return String(file.type || "").startsWith("video/");
}

function addLog(message, tone = "default") {
  const item = document.createElement("div");
  item.className = `log-entry${tone === "default" ? "" : ` log-entry-${tone}`}`;
  const timestamp = new Date().toLocaleTimeString("en-US", {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
  item.innerHTML = `<div>${message}</div><div class="log-time">${timestamp}</div>`;
  elements.logPanel.prepend(item);
}

function setStatus(text, tone = "ready") {
  elements.statusLine.textContent = text;
  elements.statusLine.style.color =
    tone === "error" ? "#a62e2e" : tone === "warn" ? "#8a6300" : "#387a49";
}

function getDefaultFps() {
  return Math.max(1, Math.min(60, Number(elements.bulkFpsInput.value) || 15));
}

function updateSizeModeUi() {
  const custom = elements.sizeModeSelect.value === "custom";
  elements.primarySizeLabel.textContent = custom ? "Width (px)" : "Long edge (px)";
  elements.secondarySizeLabel.textContent = custom ? "Height (px)" : "Height (auto)";
  elements.heightInput.disabled = !custom;
  elements.heightField.classList.toggle("field-disabled", !custom);
}

function createJob(file) {
  return {
    id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
    file,
    selected: true,
    fps: getDefaultFps(),
    status: "Waiting",
    progress: 0,
    gifBlob: null,
    gifName: file.name.replace(/\.[^.]+$/, "") + ".gif",
    previewUrl: URL.createObjectURL(file)
  };
}

function updateSummary() {
  const total = state.jobs.length;
  const readyJobs = state.jobs.filter((job) => job.gifBlob);
  const completed = readyJobs.length;
  elements.progressCounter.textContent = `${completed} / ${total} completed`;
  elements.jobsMeterLabel.textContent = `${total} jobs`;
  const progress = total === 0 ? 0 : (completed / total) * 100;
  elements.jobsMeter.style.setProperty("--completion-progress", `${progress}%`);
  elements.zipButton.textContent = completed === 1 ? "Download GIF" : "Download ZIP";
  elements.zipButton.disabled = completed === 0 || state.running;
  if (elements.topStopButton) {
    elements.topStopButton.disabled = !state.running;
  }
}

function renderQueue() {
  if (state.jobs.length === 0) {
    elements.queueBody.innerHTML = `
      <tr class="empty-row">
        <td colspan="6">Drop videos here or use Start Import.</td>
      </tr>
    `;
    updateSummary();
    return;
  }

  elements.queueBody.innerHTML = state.jobs
    .map((job) => {
      const output = job.gifBlob
        ? `<a class="output-link" href="${URL.createObjectURL(job.gifBlob)}" download="${job.gifName}">Download GIF</a>`
        : "Not ready";
      return `
        <tr>
          <td><input type="checkbox" data-select="${job.id}" ${job.selected ? "checked" : ""} /></td>
          <td>
            <div class="file-cell">
              <video class="preview" src="${job.previewUrl}" muted playsinline loop autoplay></video>
              <div>
                <div class="file-name">${job.file.name}</div>
                <div class="file-sub">${job.file.name}</div>
              </div>
            </div>
          </td>
          <td><input class="row-fps-input" type="number" min="1" max="60" value="${job.fps}" data-fps="${job.id}" /></td>
          <td><span class="status-pill">${job.status}</span></td>
          <td>
            <div class="progress-wrap">
              <div class="progress-bar"><span style="width:${job.progress}%"></span></div>
              <div class="progress-copy">${Math.round(job.progress)}%</div>
            </div>
          </td>
          <td>${output}</td>
        </tr>
      `;
    })
    .join("");

  updateSummary();
}

function getRenderSettings() {
  const mode = elements.renderModeSelect.value;
  const colors = Number(elements.colorCountInput.value) || 96;
  if (mode === "detail") {
    return { dither: "floyd_steinberg", colors: Math.max(96, colors), stats: "full" };
  }
  if (mode === "retro") {
    return { dither: "bayer", colors: Math.min(96, colors), stats: "single", bayerScale: 3 };
  }
  if (mode === "stable") {
    return { dither: "sierra2_4a", colors, stats: "single" };
  }
  return { dither: "sierra2_4a", colors, stats: "diff" };
}

function getScaleFilter() {
  const sizeMode = elements.sizeModeSelect.value;
  const width = Math.max(64, Number(elements.widthInput.value) || 640);
  const height = Math.max(64, Number(elements.heightInput.value) || 480);
  if (sizeMode === "custom") {
    return `scale=${width}:${height}:flags=lanczos`;
  }
  return `scale='if(gt(iw,ih),${width},-1)':'if(gt(iw,ih),-1,${width})':flags=lanczos`;
}

async function ensureFfmpeg() {
  if (state.ffmpegLoaded) {
    return state.ffmpeg;
  }

  setStatus("Loading browser engine...", "warn");
  addLog("Loading browser engine...");
  const baseURL = "https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm";
  const packageURL = "https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/esm";
  const ffmpeg = new FFmpeg();
  const [coreURL, wasmURL, workerURL] = await Promise.all([
    toBlobURL(`${baseURL}/ffmpeg-core.js`, "text/javascript"),
    toBlobURL(`${baseURL}/ffmpeg-core.wasm`, "application/wasm"),
    toBlobURL(`${baseURL}/ffmpeg-core.worker.js`, "text/javascript")
  ]);
  const classWorkerURL = URL.createObjectURL(
    new Blob([`import "${packageURL}/worker.js";`], { type: "text/javascript" })
  );
  await ffmpeg.load({
    coreURL,
    wasmURL,
    workerURL,
    classWorkerURL
  });
  state.ffmpeg = ffmpeg;
  state.ffmpegLoaded = true;
  addLog("Browser engine is ready.", "success");
  return ffmpeg;
}

async function resetFfmpeg() {
  if (state.ffmpeg && typeof state.ffmpeg.terminate === "function") {
    try {
      await state.ffmpeg.terminate();
    } catch (_error) {
      // no-op
    }
  }

  state.ffmpeg = null;
  state.ffmpegLoaded = false;
}

async function convertJob(job, index, total) {
  const ffmpeg = await ensureFfmpeg();
  const inputName = `${job.id}-${job.file.name}`;
  const outputName = `${job.id}.gif`;
  const paletteName = `${job.id}.png`;
  const fps = Math.max(1, Math.min(60, Number(job.fps) || 15));
  const render = getRenderSettings();
  const scale = getScaleFilter();

  addLog(`GIF generation started for ${job.file.name}. FPS: ${fps}`);
  job.status = "Converting";
  job.progress = 6;
  renderQueue();

  ffmpeg.on("progress", ({ progress }) => {
    job.progress = Math.max(6, Math.min(98, progress * 100));
    renderQueue();
  });

  try {
    await ffmpeg.writeFile(inputName, await fetchFile(job.file));
    await ffmpeg.exec([
      "-i",
      inputName,
      "-vf",
      `fps=${fps},${scale},palettegen=max_colors=${render.colors}:stats_mode=${render.stats}`,
      paletteName
    ]);

    const paletteUse =
      render.dither === "bayer"
        ? `paletteuse=dither=bayer:bayer_scale=${render.bayerScale || 3}`
        : `paletteuse=dither=${render.dither}`;

    await ffmpeg.exec([
      "-i",
      inputName,
      "-i",
      paletteName,
      "-lavfi",
      `fps=${fps},${scale}[x];[x][1:v]${paletteUse}`,
      "-loop",
      "0",
      outputName
    ]);

    const data = await ffmpeg.readFile(outputName);
    job.gifBlob = new Blob([data.buffer], { type: "image/gif" });
    job.status = "Completed";
    job.progress = 100;
    addLog(`${job.file.name} was converted to GIF successfully.`, "success");
    setStatus(`Converted ${index + 1}/${total}.`, "ready");
  } catch (error) {
    if (state.cancelRequested) {
      job.status = "Cancelled";
      job.progress = 0;
      addLog(`${job.file.name} was cancelled.`, "error");
      return;
    }

    job.status = "Error";
    job.progress = 0;
    addLog(`Conversion error: ${error.message}`, "error");
    throw error;
  } finally {
    try {
      await ffmpeg.deleteFile(inputName);
    } catch (_error) {}
    try {
      await ffmpeg.deleteFile(paletteName);
    } catch (_error) {}
    try {
      await ffmpeg.deleteFile(outputName);
    } catch (_error) {}
    renderQueue();
  }
}

async function exportAll() {
  if (state.running || state.jobs.length === 0) {
    return;
  }

  state.cancelRequested = false;
  state.running = true;
  elements.exportButton.disabled = true;
  elements.zipButton.disabled = true;

  try {
    const jobs = state.jobs.filter((job) => job.selected);
    if (jobs.length === 0) {
      setStatus("Select videos first.", "warn");
      addLog("Select videos first.", "error");
      return;
    }

    for (let index = 0; index < jobs.length; index += 1) {
      await convertJob(jobs[index], index, jobs.length);
      if (state.cancelRequested) {
        break;
      }
    }
    if (state.cancelRequested) {
      setStatus("Export stopped.", "warn");
      addLog("Export was stopped by the user.", "error");
    } else {
      setStatus("GIFs are ready.", "ready");
    }
  } catch (error) {
    console.error(error);
    setStatus("Browser conversion failed.", "error");
    addLog(`Conversion error: ${error.message}`, "error");
  } finally {
    state.running = false;
    elements.exportButton.disabled = false;
    state.cancelRequested = false;
    updateSummary();
  }
}

function downloadGifBlob(job) {
  const url = URL.createObjectURL(job.gifBlob);
  const link = document.createElement("a");
  link.href = url;
  link.download = job.gifName;
  link.click();
  URL.revokeObjectURL(url);
  setStatus("GIF downloaded.", "ready");
  addLog("GIF download is ready.", "success");
}

async function downloadOutputs() {
  const ready = state.jobs.filter((job) => job.gifBlob);
  if (ready.length === 0) {
    setStatus("No GIFs are ready for ZIP.", "warn");
    addLog("No GIFs are ready for ZIP.", "error");
    return;
  }

  if (ready.length === 1) {
    downloadGifBlob(ready[0]);
    return;
  }

  const zip = new JSZip();
  ready.forEach((job) => zip.file(job.gifName, job.gifBlob));
  const blob = await zip.generateAsync({ type: "blob" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = "gift-converter-web-export.zip";
  link.click();
  URL.revokeObjectURL(url);
  setStatus("ZIP downloaded.", "ready");
  addLog("ZIP download is ready.", "success");
}

async function stopExport() {
  if (!state.running) {
    return;
  }

  state.cancelRequested = true;
  setStatus("Stopping export...", "warn");
  addLog("Stop requested.", "error");
  await resetFfmpeg();
}

function addFiles(fileList) {
  const fresh = Array.from(fileList).filter((file) => isSupportedVideoFile(file));
  if (fresh.length === 0) {
    setStatus("No supported videos found.", "warn");
    addLog("No supported videos found.", "error");
    return;
  }
  state.jobs.push(...fresh.map(createJob));
  renderQueue();
  setStatus(`${fresh.length} videos added.`, "ready");
  addLog(`${fresh.length} videos added.`, "success");
}

elements.pickButton.addEventListener("click", () => elements.fileInput.click());
elements.fileInput.addEventListener("change", (event) => addFiles(event.target.files));
elements.applyAllFpsButton.addEventListener("click", () => {
  const fps = getDefaultFps();
  state.jobs.forEach((job) => {
    job.fps = fps;
  });
  renderQueue();
  addLog(`Applied FPS ${fps} to all videos.`);
});
elements.applySelectedFpsButton.addEventListener("click", () => {
  const fps = getDefaultFps();
  const selected = state.jobs.filter((job) => job.selected);
  if (selected.length === 0) {
    setStatus("Select videos first.", "warn");
    addLog("Select videos first.", "error");
    return;
  }
  selected.forEach((job) => {
    job.fps = fps;
  });
  renderQueue();
  addLog(`Applied FPS ${fps} to ${selected.length} selected videos.`);
});
elements.sizeModeSelect.addEventListener("change", updateSizeModeUi);
elements.exportButton.addEventListener("click", exportAll);
elements.zipButton.addEventListener("click", downloadOutputs);
if (elements.topStopButton) {
  elements.topStopButton.addEventListener("click", stopExport);
}
elements.selectAllButton.addEventListener("click", () => {
  const next = state.jobs.some((job) => !job.selected);
  state.jobs = state.jobs.map((job) => ({ ...job, selected: next }));
  renderQueue();
});
elements.clearButton.addEventListener("click", () => {
  state.jobs.forEach((job) => URL.revokeObjectURL(job.previewUrl));
  state.jobs = [];
  renderQueue();
  setStatus("List cleared.", "ready");
  addLog("List cleared.");
});
elements.queueBody.addEventListener("change", (event) => {
  const selectTarget = event.target.closest("[data-select]");
  if (selectTarget) {
    state.jobs = state.jobs.map((job) =>
      job.id === selectTarget.dataset.select ? { ...job, selected: selectTarget.checked } : job
    );
    renderQueue();
    return;
  }

  const fpsTarget = event.target.closest("[data-fps]");
  if (fpsTarget) {
    const fps = Math.max(1, Math.min(60, Number(fpsTarget.value) || 15));
    state.jobs = state.jobs.map((job) =>
      job.id === fpsTarget.dataset.fps ? { ...job, fps } : job
    );
    renderQueue();
  }
});

["dragenter", "dragover"].forEach((type) => {
  elements.dropZone.addEventListener(type, (event) => {
    event.preventDefault();
  });
});

elements.dropZone.addEventListener("drop", (event) => {
  event.preventDefault();
  addFiles(event.dataTransfer.files);
});

updateSizeModeUi();
renderQueue();
addLog("Web app is ready.");

    </script>
</body>
</html>
